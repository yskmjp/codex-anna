<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Score Player</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Dance Score Visualizer</p>
        <h1>Score Player</h1>
      </div>
      <div class="score-meta">
        <span id="scoreTitle">Loading sample score...</span>
      </div>
    </header>

    <main class="app-main">
      <section class="stage-panel">
        <div id="canvas-container" class="canvas-container"></div>
      </section>

      <section class="control-panel">
        <div class="button-row">
          <button id="playButton" type="button">Play</button>
          <button id="pauseButton" type="button">Pause</button>
          <button id="stopButton" type="button">Stop</button>
          <button id="resetButton" type="button">Reset</button>
          <label class="file-input-label" for="jsonFileInput">Load JSON File</label>
          <input id="jsonFileInput" type="file" accept=".json,application/json">
        </div>

        <div class="timeline-meta">
          <span>Current: <strong id="currentTime">0.00s</strong></span>
          <span>Total: <strong id="totalTime">0.00s</strong></span>
          <span>Status: <strong id="playbackStatus">Stopped</strong></span>
        </div>

        <div class="timeline-wrapper">
          <div class="timeline-track">
            <div id="timelineProgress" class="timeline-progress"></div>
            <div id="timelineCursor" class="timeline-cursor"></div>
          </div>
        </div>

        <p class="helper-text">
          The bundled sample score loads automatically. You can also select your own JSON file.
        </p>
      </section>
    </main>
  </div>

  <script id="embeddedSampleScore" type="application/json">
    {
      "meta": {
        "title": "Sample Dance Score"
      },
      "time": {
        "duration": 20,
        "unit": "seconds"
      },
      "lanes": [
        { "id": "woman", "label": "WOMAN" },
        { "id": "man1", "label": "MAN 1" },
        { "id": "man2", "label": "MAN 2" }
      ],
      "score": {
        "woman": {
          "events": [
            { "t_start": 0, "t_end": 4, "type": "walk", "direction": "right" },
            { "t_start": 4, "t_end": 6, "type": "jump" },
            { "t_start": 6, "t_end": 9, "type": "idle" },
            { "t_start": 9, "t_end": 12, "type": "turn" },
            { "t_start": 12, "t_end": 16, "type": "walk", "direction": "left" },
            { "t_start": 16, "t_end": 20, "type": "idle" }
          ]
        },
        "man1": {
          "events": [
            { "t_start": 0, "t_end": 5, "type": "idle" },
            { "t_start": 5, "t_end": 8, "type": "sit" },
            { "t_start": 8, "t_end": 12, "type": "walk", "direction": "right" },
            { "t_start": 12, "t_end": 14, "type": "jump" },
            { "t_start": 14, "t_end": 18, "type": "fall" },
            { "t_start": 18, "t_end": 20, "type": "idle" }
          ]
        },
        "man2": {
          "events": [
            { "t_start": 0, "t_end": 3, "type": "walk", "direction": "left" },
            { "t_start": 3, "t_end": 7, "type": "idle" },
            { "t_start": 7, "t_end": 11, "type": "turn" },
            { "t_start": 11, "t_end": 15, "type": "walk", "direction": "right" },
            { "t_start": 15, "t_end": 20, "type": "idle" }
          ]
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
