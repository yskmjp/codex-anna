<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Score Player</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>DANCE SCORE VISUALIZER</h1>
      </div>
      <div class="score-meta">
        <span id="scoreTitle">Loading sample score...</span>
      </div>
    </header>

    <main class="app-main">
      <section class="stage-panel">
        <div id="canvas-container" class="canvas-container"></div>
        <div class="stage-timeline-panel">
          <div class="timeline-meta">
            <span>Current: <strong id="currentTime">0.00s</strong></span>
            <span>Total: <strong id="totalTime">0.00s</strong></span>
            <span>Status: <strong id="playbackStatus">Stopped</strong></span>
          </div>

          <div class="timeline-wrapper">
            <div class="timeline-track">
              <div id="timelineProgress" class="timeline-progress"></div>
              <div id="timelineCursor" class="timeline-cursor"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="control-panel">
        <div class="button-row">
          <button id="playButton" type="button">Play</button>
          <button id="pauseButton" type="button">Pause</button>
          <button id="stopButton" type="button">Stop</button>
          <button id="resetButton" type="button">Reset</button>
          <button id="applyJsonButton" type="button">Apply JSON</button>
          <button id="restoreSampleButton" type="button">Restore Sample</button>
        </div>

        <div class="json-editor-panel">
          <label class="json-editor-label" for="jsonInput">Dance Score JSON</label>
          <textarea id="jsonInput" class="json-editor" spellcheck="false"></textarea>
        </div>

        <p class="helper-text">
          Paste JSON into the editor and press Apply JSON. Restore Sample puts the bundled score back into the editor.
        </p>
      </section>
    </main>
  </div>

  <script id="embeddedSampleScore" type="application/json">

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <script src="./js/score.js"></script>

</body>
</html>
